# Wallingford Regatta 2026 - post-race workflow
# Run this Sunday evening after racing finishes (results usually published same day).
# Requires: pip install requests beautifulsoup4
#
# Steps:
#   1. Generate heatmap
#   2. Review it locally in a browser
#   3. Commit and push to deploy to rowingtools.co.uk
#   4. Generate carousel slides and upload manually

regatta:
  name: "Wallingford Regatta 2026"
  comp: wallingford26
  year: 2026
  # Update this URL once results are published (usually same URL pattern as 2025)
  results_url: "https://wallingford-regatta.org.uk/2026-results/"
  # Approximate date - confirm once the draw is published
  date: "May 2026"

steps:
  generate_heatmap:
    description: Generate GMT% heatmap HTML from the live results page
    command: >
      python gmt_processor/inputs/generate_heatmap_wallingford.py
        --url "https://wallingford-regatta.org.uk/2026-results/"
        --comp wallingford26
        --title "Wallingford Regatta 2026"
        --out heatmap-wallingford26.html
    notes:
      - Run from the RowingTools repo root
      - Results page must be live before running
      - Script fetches and parses the HTML directly (no CSV export needed)
      - If the results URL differs from the pattern above, update --url accordingly

  review:
    description: Open the heatmap in a browser and sanity-check the data
    command: start heatmap-wallingford26.html
    checks:
      - Top women's 8+ should be 88-93% GMT
      - Challenge events should show mostly 80-92% GMT
      - Schools events (Op Schools 8+, 4-, etc.) should show 82-90% GMT
      - Verify club names look clean (no stray IDs or encoding artefacts)
      - Check Club Leaderboard tab ranks Thames/Molesey/Leander near the top

  add_index_link:
    description: Add the 2026 heatmap card to index.html (2026 section)
    target_file: index.html
    location: "Inside <div class='lb-year-section'> for 2026, in <div class='lb-grid'>"
    html_snippet: |
      <a href="heatmap-wallingford26.html" class="lb-card">
        <div>
          <div class="lb-card-name">Wallingford Regatta</div>
          <div class="lb-card-date">May 2026</div>
          <div class="lb-card-meta">Wallingford · XX finals · Heatmap, Top 250, Club Leaderboard, Club Compare</div>
        </div>
        <span class="lb-arrow">→</span>
      </a>
    notes:
      - Replace "XX finals" with the actual count printed by the generate script
      - Replace "May 2026" with the actual race date once confirmed

  commit_and_push:
    description: Deploy to rowingtools.co.uk via GitHub Pages
    commands:
      - git add heatmap-wallingford26.html index.html
      - 'git commit -m "add wallingford regatta 2026 heatmap"'
      - git push origin main
    notes:
      - GitHub Pages redeploys in ~30s
      - Remote uses SSH: git@github-personal:peterocall101/RowingTools.git

  generate_carousel:
    description: Generate Instagram/TikTok carousel slides (optional)
    command: >
      python gmt_processor/inputs/generate_carousel.py
        --html heatmap-wallingford26.html
    output: exhibits/wallingford26/slide-00.png ... slide-13.png
    notes:
      - Requires playwright (pip install playwright && playwright install chromium)
      - Outputs go to exhibits/wallingford26/ (gitignored - manual upload)
      - 14 slides total: cover, section dividers, top 5 results, top 5 clubs, outro
      - Upload to Instagram/TikTok manually after generation

troubleshooting:
  results_not_live:
    - Wallingford typically publishes results same day, often by late afternoon
    - If the 2026 page URL is different, check wallingford-regatta.org.uk for the link
    - The script will print "0 events" if the page structure has changed

  page_structure_changed:
    - The scraper looks for <h1> event headings and <table class='race'> / <table class='results'>
    - If Wallingford changes their results software, the scraper may need updating
    - Script to diagnose: python -c "import requests; from bs4 import BeautifulSoup; soup = BeautifulSoup(requests.get('URL').text, 'html.parser'); print([t.get('class') for t in soup.find_all('table')[:10]])"

  wrong_event_counts:
    - U16 and U15 events are excluded by design (no valid WBT comparison)
    - Schools/J18 events are included and use standard adult boat class WBTs
    - If a new age category is added (e.g. U17), update EXCLUDE_RE in the script
