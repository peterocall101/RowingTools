<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Henley post generator (unlisted)</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/app.css">
<style>
.pg-note{font-size:12px;color:var(--text3);background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px;margin-bottom:1.25rem}
.pg-bar{display:flex;flex-wrap:wrap;gap:8px 14px;align-items:center;margin-bottom:1rem}
.pg-bar-label{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);width:46px}
.pg-bar select{min-width:280px}
.pg-go{background:#c8472b;color:#fff;border:none;border-radius:10px;padding:11px 24px;font-size:15px;font-weight:700;cursor:pointer;margin:.5rem 0 1.5rem}
.pg-go:hover{background:#b03d26}
#pg-caption{max-width:420px;margin-bottom:1.5rem}
.pg-cap-lbl{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);margin-bottom:6px}
#pg-cap-txt{width:100%;background:var(--bg2);color:var(--text);border:1.5px solid var(--border2);border-radius:10px;padding:12px;font-family:inherit;font-size:13px;line-height:1.55;resize:vertical}
.pg-cards{display:flex;flex-direction:column;gap:20px;max-width:420px}
.pg-card img{width:100%;border-radius:10px;display:block;border:1px solid var(--border)}
.pg-dl{margin-top:8px;width:100%;background:var(--bg2);color:var(--text);border:1.5px solid var(--border2);border-radius:8px;padding:11px;font-size:14px;font-weight:600;cursor:pointer}
.pg-dl:hover{border-color:#c8472b;color:#c8472b}
</style>
</head>
<body>
<div class="topbar"></div>
<header class="site-hdr">
  <div class="brand"><a href="/"><div class="brand-mark">Rowing<span class="brand-dot">.</span>Tools</div></a></div>
  <p class="sub">Henley Instagram post generator</p>
</header>
<a href="/henley/" class="back-link" style="font-size:13px;color:var(--text3);text-decoration:none">← Back to Henley leaderboards</a>

<p class="pg-note">Unlisted creator tool (not linked or indexed). Pick a day - the suggested angle is auto-selected (change it if you like) - then generate a short carousel + caption, save each image, and post.</p>

<div class="pg-bar"><span class="pg-bar-label">Year</span><div class="lbtab-wrap" id="pg-years"></div></div>
<div class="pg-bar"><span class="pg-bar-label">Day</span><div class="lbtab-wrap" id="pg-days"></div></div>
<div class="pg-bar"><span class="pg-bar-label">Angle</span>
  <select id="pg-angle">
    <optgroup label="% of Henley record">
      <option value="barrier-rec">Fastest starts — to the Barrier</option>
      <option value="fawley-rec">Through the half-mile — to Fawley</option>
      <option value="finish-rec">Closest to the record — Finish</option>
    </optgroup>
    <optgroup label="% of World Best Time">
      <option value="barrier-wbt">Fastest starts — Barrier (vs WBT)</option>
      <option value="fawley-wbt">To Fawley (vs WBT)</option>
      <option value="finish-wbt">Fastest crews — Finish (vs WBT)</option>
    </optgroup>
    <optgroup label="Stories">
      <option value="records">Records broken today</option>
      <option value="biggest">Biggest wins</option>
      <option value="closest">Closest races</option>
    </optgroup>
  </select>
</div>
<button type="button" id="pg-go" class="pg-go">📸 Generate carousel + caption</button>

<div id="pg-caption"></div>
<div class="pg-cards" id="pg-cards"></div>

<script>
var YEAR_CANDIDATES=['2026','2025'];
var DAY_ORDER=['Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
// Suggested rotation: a different angle each day so the feed never repeats.
var DAY_ANGLE={Tuesday:'barrier-rec',Wednesday:'fawley-rec',Thursday:'finish-wbt',Friday:'records',Saturday:'finish-rec',Sunday:'finish-wbt'};
var DIST={barrier:637,fawley:1047,finish:2112};
var ANGLES={
  'barrier-rec':{cover:['FASTEST','STARTS'],title:'Fastest starts',sub:'Top 5 to the Barrier · % of Henley record',kind:'rec',marker:'barrier',what:'closest to the Barrier record'},
  'fawley-rec':{cover:['THROUGH THE','HALF-MILE'],title:'Through the half-mile',sub:'Top 5 to Fawley · % of Henley record',kind:'rec',marker:'fawley',what:'closest to the Fawley record'},
  'finish-rec':{cover:['CLOSEST TO','THE RECORD'],title:'Closest to the record',sub:'Top 5 to the Finish · % of Henley record',kind:'rec',marker:'finish',what:'closest to the course record'},
  'barrier-wbt':{cover:['FASTEST','STARTS'],title:'Fastest starts',sub:'Top 5 to the Barrier · % of World Best',kind:'wbt',marker:'barrier',what:'fastest to the Barrier vs World Best'},
  'fawley-wbt':{cover:['THROUGH THE','HALF-MILE'],title:'Through the half-mile',sub:'Top 5 to Fawley · % of World Best',kind:'wbt',marker:'fawley',what:'fastest to Fawley vs World Best'},
  'finish-wbt':{cover:['FASTEST','CREWS'],title:'Fastest crews',sub:'Top 5 · % of World Best Time',kind:'wbt',marker:'finish',what:'fastest vs World Best Time'},
  'records':{cover:['RECORDS','BROKEN'],title:'Course records broken',sub:'New Henley course records today',kind:'records'},
  'biggest':{cover:['BIGGEST','WINS'],title:'Biggest wins',sub:'Largest winning margins',kind:'margin',dir:'big'},
  'closest':{cover:['CLOSEST','RACES'],title:'Closest races',sub:'Smallest winning margins',kind:'margin',dir:'close'}
};
var state={year:'',day:'',angle:'barrier-rec'};
var RECORDS={}, WBT={}, RACES=[], YEARS=[], _cache={};

function parseWbt(t){var p=(t||'').split(':');return p.length===2?(+p[0])*60+parseFloat(p[1]):null;}
function wbtBoat(c){return c?c.replace(/^O/,'M'):null;}
function recColor(p){if(p==null)return '#6b7280';if(p>=100)return '#fbbf24';if(p>=98)return '#34d399';if(p>=96)return '#60a5fa';if(p>=93)return '#fb923c';return '#f87171';}
function gmtColor(p){if(p==null)return '#6b7280';if(p>=87)return '#34d399';if(p>=80)return '#60a5fa';if(p>=72)return '#fb923c';return '#f87171';}
function markerEntry(race,m){var s=race[m];if(!s||s.secs==null||s.secs<=0)return null;var win=m==='finish'?true:!s.loserLeading;
  return {crew:win?race.winner:race.loser,secs:s.secs,display:s.display,newRecord:!!s.newRecord,loserLeading:!!s.loserLeading,eventFull:race.event,event:race.eventShort||race.event,eventKey:race.eventKey,cls:race['class']};}
function buildBest(m){var best={};RACES.forEach(function(r){if(r.withdrawn)return;if(state.day&&r.day!==state.day)return;var e=markerEntry(r,m);if(!e||!e.crew)return;var k=e.crew+'|'+e.eventKey;if(!best[k]||e.secs<best[k].secs)best[k]=e;});return Object.keys(best).map(function(k){return best[k];});}
function recBaseline(ek,m){var r=RECORDS[ek];if(!r||!r[m])return null;var y=+state.year,pre=r[m].filter(function(x){return x.year&&x.year<y;});return pre.length?pre.reduce(function(a,b){return b.secs<a.secs?b:a;}):null;}
function dayRaces(){return RACES.filter(function(r){return !r.withdrawn&&(!state.day||r.day===state.day)&&r.verdict&&!/row.?over|not rowed/i.test(r.verdict);});}
function marginLengths(v){v=(v||'').toLowerCase();if(/easily/.test(v))return 99;if(/dead heat/.test(v))return 0;if(/feet/.test(v))return 0.08;if(/canvas/.test(v))return 0.2;var n=0,m=v.match(/(\d+)/);if(m)n=parseInt(m[1]);if(/¾/.test(v))n+=0.75;else if(/½/.test(v))n+=0.5;else if(/¼/.test(v))n+=0.25;return n;}

function rowsFor(a){
  if(a.kind==='rec')return buildBest(a.marker).map(function(e){var b=recBaseline(e.eventKey,a.marker);return {e:e,pct:b?(b.secs/e.secs*100):null};})
    .filter(function(o){return o.pct!=null;}).sort(function(x,y){return y.pct-x.pct;}).slice(0,5)
    .map(function(o,i){return {rank:i+1,name:o.e.crew,sub:o.e.eventFull,val:o.pct.toFixed(1)+'%',color:recColor(o.pct)};});
  if(a.kind==='wbt'){var sc=2000/DIST[a.marker];return buildBest(a.marker).map(function(e){var w=WBT[wbtBoat(e.cls)];return {e:e,pct:w?(w/(e.secs*sc)*100):null};})
    .filter(function(o){return o.pct!=null;}).sort(function(x,y){return y.pct-x.pct;}).slice(0,5)
    .map(function(o,i){return {rank:i+1,name:o.e.crew,sub:o.e.eventFull,val:o.pct.toFixed(1)+'%',color:gmtColor(o.pct)};});}
  if(a.kind==='margin'){var dr=dayRaces();dr.sort(function(x,y){return a.dir==='big'?marginLengths(y.verdict)-marginLengths(x.verdict):marginLengths(x.verdict)-marginLengths(y.verdict);});
    return dr.slice(0,5).map(function(r,i){return {rank:i+1,name:r.winner,sub:r.eventShort||r.event,val:r.verdict,color:a.dir==='big'?'#fb923c':'#34d399'};});}
  return [];
}
function recordsList(){var day=state.day,nr=[];RACES.forEach(function(r){if(day&&r.day!==day)return;['barrier','fawley','finish'].forEach(function(mk){if(r[mk]&&r[mk].newRecord){var win=mk==='finish'?true:!r[mk].loserLeading;nr.push({crew:win?r.winner:r.loser,event:r.eventShort||r.event,marker:mk,time:r[mk].display});}});});return nr;}

// ── card SVGs (1080x1350) ──
function _x(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function _tr(s,n){s=s||'';return s.length>n?s.slice(0,n-1)+'…':s;}
function _t(x,y,s,sz,fill,w,anchor,fam){return '<text x="'+x+'" y="'+y+'" font-family="'+(fam||'-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif')+'" font-size="'+sz+'" font-weight="'+(w||'400')+'" fill="'+fill+'"'+(anchor?' text-anchor="'+anchor+'"':'')+'>'+_x(s)+'</text>';}
var _HDR='<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">';
function _frame(){return '<rect width="1080" height="1350" fill="#0f0f0e"/><rect width="1080" height="10" fill="#c8472b"/>';}
function _foot(n){return _t(80,1290,n,26,'#6b7280','500')+_t(1000,1290,'rowingtools.co.uk/henley',26,'#c8472b','700','end');}
function _coverA(a,day){return _HDR+_frame()
  +_t(80,150,'Rowing.Tools',42,'#f5efe6','700',null,'Georgia,serif')
  +_t(80,580,a.cover[0],90,'#f0f0ee','800',null,'Georgia,serif')
  +_t(80,675,a.cover[1],90,'#c8472b','800',null,'Georgia,serif')
  +_t(80,775,'HENLEY ROYAL REGATTA '+state.year,30,'#9ca3af','700')
  +_t(80,825,(day||'').toUpperCase(),38,'#f0f0ee','700')
  +_t(80,1180,a.sub,28,'#6b7280','500')
  +_foot('Live results during the regatta')+'</svg>';}
function _board(title,sub,rows){
  var s=_HDR+_frame()+_t(80,90,'Rowing.Tools',32,'#f5efe6','700',null,'Georgia,serif')+_t(1000,90,'HENLEY '+state.year,26,'#c8472b','700','end')
    +'<line x1="80" y1="120" x2="1000" y2="120" stroke="#252523" stroke-width="2"/>'+_t(80,212,title,56,'#f0f0ee','800')+_t(80,264,sub,28,'#9ca3af','500');
  if(!rows.length)return s+_t(80,470,'— none today —',38,'#6b7280','600')+_foot('')+'</svg>';
  var y=420,rh=132;
  rows.forEach(function(r,i){s+=_t(80,y+i*rh,String(r.rank),40,'#6b7280','700')+_t(175,y+i*rh,_tr(r.name,24),44,'#f0f0ee','700')
    +_t(175,y+i*rh+44,_tr(r.sub,32),26,'#9ca3af','500')+_t(1000,y+i*rh,r.val,52,r.color,'800','end');});
  return s+_foot('')+'</svg>';
}
function _records(day,nr){
  var s=_HDR+_frame()+_t(80,90,'Rowing.Tools',32,'#f5efe6','700',null,'Georgia,serif')+_t(1000,90,'HENLEY '+state.year,26,'#c8472b','700','end')
    +'<line x1="80" y1="120" x2="1000" y2="120" stroke="#252523" stroke-width="2"/>'+_t(80,212,'Course records broken',54,'#fbbf24','800')+_t(80,264,day,28,'#9ca3af','500');
  if(!nr.length)return s+_t(80,470,'— none broken today —',38,'#6b7280','600')+_foot('')+'</svg>';
  var y=420,rh=150;
  nr.slice(0,5).forEach(function(r,i){s+=_t(80,y+i*rh,_tr(r.crew,26),44,'#f0f0ee','700')+_t(80,y+i*rh+44,r.event+' · '+r.marker,26,'#9ca3af','500')+_t(1000,y+i*rh,r.time,48,'#fbbf24','800','end');});
  return s+_foot('New Henley records')+'</svg>';
}
function _outro(day){return _HDR+_frame()
  +_t(80,150,'Rowing.Tools',42,'#f5efe6','700',null,'Georgia,serif')
  +_t(80,560,'Every crew,',70,'#f0f0ee','800',null,'Georgia,serif')
  +_t(80,650,'split &amp; condition',70,'#f0f0ee','800',null,'Georgia,serif')
  +_t(80,770,'rowingtools.co.uk',46,'#c8472b','800')
  +_t(80,830,'/henley',46,'#c8472b','800')
  +_t(80,1180,'Barrier · Fawley · Finish — % of record &amp; World Best, with race-day weather',26,'#6b7280','500')
  +_foot('Live during the regatta')+'</svg>';}
function _svgToPng(svg,fn){var url=URL.createObjectURL(new Blob([svg],{type:'image/svg+xml'}));var img=new Image();
  img.onload=function(){var c=document.createElement('canvas');c.width=1080;c.height=1350;c.getContext('2d').drawImage(img,0,0,1080,1350);
    c.toBlob(function(b){var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=fn;a.click();},'image/png');URL.revokeObjectURL(url);};img.src=url;}

function _tags(){return '#HenleyRoyalRegatta #HRR #Henley'+state.year+' #rowing #rowingtools';}
function caption(a,day,rows,nr){
  var L=['Henley Royal Regatta '+state.year+' — '+day,'',a.title+' 🚣'];
  if(a.kind==='records'){
    if(nr.length){L.push(nr.length+' new course record'+(nr.length>1?'s':'')+' today 🔥');nr.slice(0,4).forEach(function(r){L.push('• '+r.crew+' — '+r.event+' ('+r.marker+') '+r.time);});}
    else L.push('No course records broken today.');
  } else {
    rows.slice(0,3).forEach(function(r){L.push(r.rank+'. '+r.name+' ('+r.sub+') — '+r.val);});
  }
  L.push('','Full leaderboards, splits &amp; race-day conditions → rowingtools.co.uk/henley','',_tags());
  return L.join('\n').replace(/&amp;/g,'&');
}

function generate(){
  var a=ANGLES[state.angle], day=state.day||'';
  var cards=[{svg:_coverA(a,day),name:'henley-'+state.year+'-01-cover.png'}], rows=[], nr=[];
  if(a.kind==='records'){ nr=recordsList(); cards.push({svg:_records(day,nr),name:'henley-'+state.year+'-02-records.png'}); }
  else { rows=rowsFor(a); if(!rows.length){alert('No data for this angle on the selected day yet.');return;} cards.push({svg:_board(a.title,a.sub,rows),name:'henley-'+state.year+'-02-board.png'}); }
  cards.push({svg:_outro(day),name:'henley-'+state.year+'-03-outro.png'});
  document.getElementById('pg-caption').innerHTML='<div class="pg-cap-lbl">Suggested caption</div><textarea id="pg-cap-txt" rows="9"></textarea><button class="pg-dl" id="pg-cap-copy">📋 Copy caption</button>';
  document.getElementById('pg-cap-txt').value=caption(a,day,rows,nr);
  document.getElementById('pg-cap-copy').onclick=function(){var t=document.getElementById('pg-cap-txt');t.select();try{navigator.clipboard.writeText(t.value);}catch(e){document.execCommand('copy');}this.textContent='✓ Copied';};
  var box=document.getElementById('pg-cards');
  box.innerHTML=cards.map(function(c,i){return '<div class="pg-card"><img src="data:image/svg+xml;utf8,'+encodeURIComponent(c.svg)+'" alt=""><button class="pg-dl" data-i="'+i+'">⬇ Save image '+(i+1)+' of '+cards.length+'</button></div>';}).join('');
  box.querySelectorAll('.pg-dl[data-i]').forEach(function(b){b.onclick=function(){var c=cards[+b.dataset.i];_svgToPng(c.svg,c.name);};});
}

function setActive(box,btn){box.querySelectorAll('.lbtab').forEach(function(b){b.classList.toggle('active',b===btn);});}
function clearOut(){document.getElementById('pg-cards').innerHTML='';document.getElementById('pg-caption').innerHTML='';}
function renderDays(){
  var present=[]; RACES.forEach(function(r){if(present.indexOf(r.day)<0)present.push(r.day);});
  present.sort(function(a,b){return DAY_ORDER.indexOf(a)-DAY_ORDER.indexOf(b);});
  if(present.indexOf(state.day)<0)state.day=present[0]||'';
  if(DAY_ANGLE[state.day]){state.angle=DAY_ANGLE[state.day];document.getElementById('pg-angle').value=state.angle;}
  var box=document.getElementById('pg-days');
  box.innerHTML=present.map(function(d){return '<button class="lbtab'+(d===state.day?' active':'')+'" data-day="'+d+'">'+d.slice(0,3)+'</button>';}).join('');
  box.querySelectorAll('.lbtab').forEach(function(b){b.onclick=function(){state.day=b.dataset.day;setActive(box,b);if(DAY_ANGLE[state.day]){state.angle=DAY_ANGLE[state.day];document.getElementById('pg-angle').value=state.angle;}clearOut();};});
}
function loadYear(y){state.year=y;state.day='';RACES=_cache[y]||[];renderDays();clearOut();}
function renderYears(){
  var box=document.getElementById('pg-years');
  box.innerHTML=YEARS.map(function(y,i){return '<button class="lbtab'+(i===0?' active':'')+'" data-year="'+y+'">'+y+'</button>';}).join('');
  box.querySelectorAll('.lbtab').forEach(function(b){b.onclick=function(){setActive(box,b);loadYear(b.dataset.year);};});
}

document.getElementById('pg-angle').onchange=function(){state.angle=this.value;clearOut();};
document.getElementById('pg-go').onclick=generate;
Promise.all([
  fetch('/data/henley_records.json').then(function(r){return r.json();}),
  fetch('/data/benchmarks_v3.json').then(function(r){return r.json();})
]).then(function(res){
  RECORDS=res[0]; var w=res[1].wbt||{}; Object.keys(w).forEach(function(k){WBT[k]=parseWbt(w[k].time);});
  return Promise.all(YEAR_CANDIDATES.map(function(y){return fetch('/data/henley_'+y+'.json').then(function(r){return r.ok?r.json():null;}).catch(function(){return null;}).then(function(d){return {y:y,d:d};});}));
}).then(function(found){
  found.forEach(function(o){if(o.d&&o.d.length){_cache[o.y]=o.d;YEARS.push(o.y);}});
  if(!YEARS.length){document.getElementById('pg-cards').innerHTML='<p style="color:var(--text3)">No Henley data available yet.</p>';return;}
  renderYears(); loadYear(YEARS[0]);
}).catch(function(){document.getElementById('pg-cards').innerHTML='<p style="color:var(--text3)">Could not load Henley data.</p>';});
</script>
</body>
</html>
