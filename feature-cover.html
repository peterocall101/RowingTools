<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#2a2a2a;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Inter',sans-serif}
.card{position:relative;width:1080px;height:1350px;background:radial-gradient(120% 90% at 70% 8%,#16242e 0%,#0f0f0e 55%);color:#f0f0ee;overflow:hidden}
.topbar{position:absolute;top:0;left:0;width:100%;height:8px;background:#c8472b}
.pad{position:absolute;inset:0;padding:90px 84px}
.brand{font-family:'Fraunces',serif;font-weight:900;font-size:34px;letter-spacing:-0.03em}
.brand .dot{color:#c8472b}
.pill{display:inline-flex;align-items:center;gap:10px;margin-top:64px;background:rgba(200,71,43,0.16);border:1.5px solid rgba(200,71,43,0.55);color:#ef8268;padding:9px 20px;border-radius:999px;font-size:22px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
.pill svg{width:24px;height:24px}
h1{font-family:'Fraunces',serif;font-weight:900;font-size:124px;line-height:0.95;letter-spacing:-3px;margin-top:30px}
.sub{font-size:33px;line-height:1.4;color:#c9c9c6;margin-top:26px;max-width:740px;font-weight:500}
.sub b{color:#fff;font-weight:700}
.hero{position:absolute;left:0;right:0;bottom:230px;display:flex;justify-content:center}
.hero svg{width:760px;height:auto}
.chips{position:absolute;left:84px;bottom:150px;display:flex;gap:14px}
.chip{display:flex;align-items:center;gap:9px;background:#1a1a18;border:1px solid rgba(255,255,255,.10);border-radius:14px;padding:13px 20px;font-size:26px;font-weight:700}
.foot{position:absolute;left:84px;right:84px;bottom:70px;display:flex;align-items:center;justify-content:space-between}
.foot .url{font-size:26px;color:#9ca3af;font-weight:600}
.swipe{display:inline-flex;align-items:center;gap:10px;font-size:26px;font-weight:700;color:#ef8268}
.swipe svg{width:30px;height:30px}
.wx-oar{stroke:#c8472b;stroke-width:2.4;stroke-linecap:round}
</style></head><body>
<div class="card" id="card"><div class="topbar"></div>
<div class="pad">
<div class="brand">Rowing<span class="dot">.</span>Tools</div>
<div class="pill"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.59 4.59A2 2 0 1 1 11 8H2"/><path d="M17.73 7.73A2.5 2.5 0 1 1 19.5 12H2"/><path d="M12.59 19.41A2 2 0 1 0 14 16H2"/></svg>New feature</div>
<h1>Race<br>conditions</h1>
<p class="sub">Tap any race and replay the <b>wind, water &amp; weather</b> every crew rowed into &mdash; and whether it was a head, tail or cross wind down the course.</p>
</div>
<div class="hero"><svg viewBox="0 0 320 200" preserveAspectRatio="xMidYMid meet">
<defs><linearGradient id="water" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0d2438"/><stop offset="1" stop-color="#0a1a28"/></linearGradient></defs>
<g stroke="#7bbfff" stroke-opacity="0.30" stroke-width="1.4" stroke-linecap="round"><line x1="40" y1="36" x2="58" y2="52"/><line x1="92" y1="20" x2="110" y2="36"/><line x1="150" y1="30" x2="168" y2="46"/><line x1="22" y1="92" x2="40" y2="108"/><line x1="250" y1="150" x2="268" y2="166"/><line x1="210" y1="172" x2="228" y2="188"/><line x1="288" y1="96" x2="306" y2="112"/></g>
<g transform="translate(160,100) rotate(127)">
<polygon points="-30,-78 30,-78 30,78 -30,78" fill="url(#water)"/>
<g stroke="rgba(255,255,255,.10)" stroke-width="1"><line x1="-22.5" y1="-78" x2="-22.5" y2="78"/><line x1="-15" y1="-78" x2="-15" y2="78"/><line x1="-7.5" y1="-78" x2="-7.5" y2="78"/><line x1="0" y1="-78" x2="0" y2="78"/><line x1="7.5" y1="-78" x2="7.5" y2="78"/><line x1="15" y1="-78" x2="15" y2="78"/><line x1="22.5" y1="-78" x2="22.5" y2="78"/></g>
<line x1="-30" y1="78" x2="30" y2="78" stroke="rgba(255,255,255,.18)" stroke-width="1.5"/>
<line x1="-30" y1="-78" x2="30" y2="-78" stroke="rgba(123,191,255,.55)" stroke-width="1.5"/>
<g transform="translate(0,6)"><g><line class="wx-oar" x1="-3" y1="-30" x2="-15" y2="-36"/><line class="wx-oar" x1="3" y1="-30" x2="15" y2="-36"/><line class="wx-oar" x1="-3" y1="-20" x2="-15" y2="-26"/><line class="wx-oar" x1="3" y1="-20" x2="15" y2="-26"/><line class="wx-oar" x1="-3" y1="-10" x2="-15" y2="-16"/><line class="wx-oar" x1="3" y1="-10" x2="15" y2="-16"/><line class="wx-oar" x1="-3" y1="0" x2="-15" y2="-6"/><line class="wx-oar" x1="3" y1="0" x2="15" y2="-6"/></g><path d="M0,-40 C5,-22 5,22 0,40 C-5,22 -5,-22 0,-40 Z" fill="#e8e4dc" stroke="#0f0f0e" stroke-width="1"/></g>
</g>
<g transform="translate(280,42)"><circle r="26" fill="rgba(0,0,0,.4)" stroke="rgba(255,255,255,.14)"/><text x="0" y="-17" text-anchor="middle" font-size="8" fill="#9ca3af" font-weight="700" font-family="Inter,sans-serif">N</text><line x1="0" y1="11" x2="0" y2="-11" stroke="rgba(255,255,255,.14)" stroke-width="1"/><g transform="rotate(135)"><line x1="0" y1="13" x2="0" y2="-11" stroke="#7bbfff" stroke-width="2.4"/><path d="M0,-15 l-5,8 l10,0 Z" fill="#7bbfff"/></g></g>
</svg></div>
<div class="chips"><div class="chip">&#x1F32C;&#xFE0F; Tailwind</div><div class="chip">&#x1F321;&#xFE0F; 19&deg;C</div><div class="chip">&#x1F4A8; 22 km/h</div></div>
<div class="foot"><div class="url">rowingtools.co.uk</div><div class="swipe">Swipe <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M13 6l6 6-6 6"/></svg></div></div>
</div></body></html>
